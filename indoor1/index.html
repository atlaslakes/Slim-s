<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Indoor 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #slide {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 1;
      transition: opacity 0.8s ease-in-out;
    }

    #slide.fade {
      opacity: 0;
    }
  </style>
</head>
<body>
  <img id="slide" src="" alt="" />

  <script>
    const updateCheckUrl = `${window.location.pathname}?t=${Date.now()}`;
    let lastSeenHtml = document.documentElement.outerHTML;

    async function checkForUpdates() {
      try {
        const response = await fetch(updateCheckUrl, { cache: 'no-store' });
        if (!response.ok) return;

        const latestHtml = await response.text();
        if (latestHtml && latestHtml !== lastSeenHtml) {
          window.location.reload();
          return;
        }

        lastSeenHtml = latestHtml || lastSeenHtml;
      } catch (error) {
        console.debug('Update check failed', error);
      }
    }

    setInterval(checkForUpdates, 5000);
    checkForUpdates();
  </script>

  <script>
    const images = [
      "Burgers TV.png"
    ];

    async function run() {
      const imgs = images;
      if (!imgs.length) return;

      const el = document.getElementById('slide');
      let index = 0;

      function show(i) {
        el.classList.add('fade');
        setTimeout(() => {
          el.src = 'assets/' + imgs[i];
          el.onload = () => el.classList.remove('fade');
        }, 800);
      }

      // Preload first
      el.src = 'assets/' + imgs[0];
      el.onload = () => el.classList.remove('fade');

      if (imgs.length > 1) {
        setInterval(() => {
          index = (index + 1) % imgs.length;
          show(index);
        }, 5000);
      }
    }

    run();
  </script>
</body>
</html>
